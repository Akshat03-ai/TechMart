<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Change Password — TechMart</title>
  <link rel="stylesheet" href="css/style.css">

    <!-- Header -->
  <header>
    <h1 style="text-align:center; margin:30px 0; font-size:2.2rem; color:#333;">TechMart</h1>
  </header>
  
  <style>
    /* page-specific tweaks */
    body {
      background: #f2f3f7;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .change-box {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      width: 340px;
      margin: 60px auto; /* same as auth-box */
      padding: 25px 25px 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-left: 40px;
      padding-right: 20px;
      min-height: 31px; /* match auth box height */
    }

    .change-box h2 {
      color: #000000;
      margin-bottom: 20px;
      margin-right: 22px;
      font-size: 1.6rem;
    }

    .change-box input {
      width: 85%;
      padding: 10px;
      margin-left: 5px;
      margin-bottom: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .change-box button {
      width: 85%;
      background: #007bff;
      color: white;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-right: 8px;
      margin-left: 15px;
      font-weight: 600;
      transition: background 0.25s ease;
      cursor: pointer;
    }

    .change-box button:hover {
      background: #0056b3;
    }

    .back-link {
      margin-top: 15px;
      color: #007bff;
      margin-right: 30px;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>
  <div class="change-box">
    <h2>Change Password</h2>
    <form id="changeForm">
      <input type="email" id="email" placeholder="Registered Email" required>
      <input type="password" id="newPassword" placeholder="New Password" required>
      <button type="submit">Update Password</button>
    </form>
    <a href="auth.html?tab=login" class="back-link">← Back to Login</a>
  </div>

  <script>
    document.getElementById('changeForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const newPassword = document.getElementById('newPassword').value.trim();

      try {
        const res = await fetch('http://localhost:3000/users/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, newPassword })
        });

        const text = await res.text();
        alert(text);

        if (res.ok) window.location.href = 'auth.html?tab=login';
      } catch (err) {
        console.error(err);
        alert('Error updating password');
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TechMart - Login / Signup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1 style="text-align:center; margin:30px 0; font-size:2.2rem; color:#333;">TechMart</h1>
  </header>

  <!-- Auth Container -->
  <div class="auth-container">
    <div class="auth-box">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button id="signupTab" class="active">Sign Up</button>
        <button id="loginTab">Login</button>
      </div>

      <!-- Signup Form -->
      <form id="signupForm" class="auth-form active">
        <h2>Create Account</h2>
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email-signup" placeholder="Email" required>
        <input type="password" id="password-signup" placeholder="Password" required>
        <button type="submit">Sign Up</button>
      </form>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form">
        <h2>Login</h2>
        <input type="email" id="email-login" placeholder="Email" required>
        <input type="password" id="password-login" placeholder="Password" required>
        <button type="submit">Login</button>
        <p class="forgot-password">
          <a href="change-password.html">Forgot/Change Password?</a>
        </p>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/main.js"></script>
</body>
</html>
